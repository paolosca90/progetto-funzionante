<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AI Cash-Revolution</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <i class="fas fa-robot"></i>
                    <h1>AI Cash-Revolution</h1>
                </div>
                <h2>Imposta Nuova Password</h2>
                <p>Inserisci la tua nuova password</p>
            </div>

            <form id="reset-password-form" class="auth-form">
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Nuova Password
                    </label>
                    <input type="password" id="password" name="password" required minlength="6">
                    <small>Minimo 6 caratteri</small>
                </div>

                <div class="form-group">
                    <label for="confirm-password">
                        <i class="fas fa-lock"></i>
                        Conferma Password
                    </label>
                    <input type="password" id="confirm-password" name="confirm-password" required minlength="6">
                </div>

                <button type="submit" class="btn-primary" id="reset-btn">
                    <i class="fas fa-save"></i>
                    Aggiorna Password
                </button>
            </form>

            <div class="auth-links">
                <p>
                    <a href="login.html" class="link-primary">
                        <i class="fas fa-arrow-left"></i>
                        Torna al Login
                    </a>
                </p>
            </div>
        </div>
    </div>

    <!-- Success/Error Messages -->
    <div id="message-container"></div>

    <script src="static/js/main.js"></script>
    <script>
        // Get token from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showErrorMessage('Token di reset mancante. Richiedi un nuovo link di reset password.');
            setTimeout(() => {
                window.location.href = 'forgot-password.html';
            }, 3000);
        }

        document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!token) return;
            
            const submitBtn = document.getElementById('reset-btn');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                showErrorMessage('Le password non coincidono');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Aggiornamento...';
            
            try {
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `token=${encodeURIComponent(token)}&new_password=${encodeURIComponent(password)}`
                });

                if (response.ok) {
                    const result = await response.json();
                    showSuccessMessage(result.message || 'Password aggiornata con successo! Reindirizzamento al login...');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Errore durante l\'aggiornamento della password');
                }
            } catch (error) {
                showErrorMessage(error.message || 'Errore durante l\'aggiornamento della password');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Aggiorna Password';
            }
        });
    </script>
</body>
</html>
