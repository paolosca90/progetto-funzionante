<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupera Password - AI Cash-Revolution</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <i class="fas fa-robot"></i>
                    <h1>AI Cash-Revolution</h1>
                </div>
                <h2>Recupera Password</h2>
                <p>Inserisci la tua email per ricevere il link di reset</p>
            </div>

            <form id="forgot-password-form" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="email" name="email" required>
                </div>

                <button type="submit" class="btn-primary" id="reset-btn">
                    <i class="fas fa-paper-plane"></i>
                    Invia Link di Reset
                </button>
            </form>

            <div class="auth-links">
                <p>
                    <a href="login.html" class="link-primary">
                        <i class="fas fa-arrow-left"></i>
                        Torna al Login
                    </a>
                </p>
                <p>
                    Non hai un account? 
                    <a href="register.html" class="link-secondary">Registrati</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Success/Error Messages -->
    <div id="message-container"></div>

    <script src="static/js/main.js"></script>
    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('reset-btn');
            const email = document.getElementById('email').value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Invio in corso...';
            
            try {
                const response = await fetch('/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `email=${encodeURIComponent(email)}`
                });

                if (response.ok) {
                    const result = await response.json();
                    showSuccessMessage(result.message || 'Email inviata con successo! Controlla la tua casella di posta.');
                    document.getElementById('forgot-password-form').reset();
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Errore durante l\'invio dell\'email');
                }
            } catch (error) {
                showErrorMessage(error.message || 'Errore durante l\'invio dell\'email');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Invia Link di Reset';
            }
        });
    </script>
</body>
</html>
