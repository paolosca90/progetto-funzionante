<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Database Migration - AI Cash-Revolution</title>
    <style>
        body {
            font-family: 'Orbitron', monospace;
            background: #0a0a0a;
            color: #00ff41;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1a1a;
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #00ff41;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #00ff41;
            font-weight: bold;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            border: 1px solid #00ff41;
            border-radius: 5px;
            color: #00ff41;
            font-family: 'Source Code Pro', monospace;
            font-size: 14px;
        }
        
        input[type="text"]:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }
        
        .migrate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #003300, #006600);
            border: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .migrate-btn:hover {
            background: linear-gradient(45deg, #004400, #008800);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            transform: translateY(-2px);
        }
        
        .migrate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            display: none;
        }
        
        .result.success {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid #00ff41;
            color: #00ff41;
        }
        
        .result.error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        
        .warning {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid orange;
            color: orange;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .warning h3 {
            margin-top: 0;
            color: orange;
        }
        
        pre {
            background: #0f0f0f;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
        
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid #00ff41;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚨 Emergency Database Migration</h1>
        
        <div class="warning">
            <h3>⚠️ WARNING - EMERGENCY USE ONLY</h3>
            <p>This endpoint is for emergency database migration when normal login is broken due to missing database columns.</p>
            <p><strong>Only use this if you have the emergency migration token.</strong></p>
        </div>
        
        <form id="migration-form">
            <div class="form-group">
                <label for="token">Emergency Migration Token:</label>
                <input type="text" id="token" name="token" required placeholder="Enter emergency migration token">
            </div>
            
            <button type="submit" class="migrate-btn" id="migrate-btn">
                <span class="btn-text">Run Emergency Migration</span>
                <div class="spinner"></div>
            </button>
        </form>
        
        <div id="result" class="result">
            <h3 id="result-title"></h3>
            <pre id="result-content"></pre>
        </div>
    </div>

    <script>
        document.getElementById('migration-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('migrate-btn');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');
            const result = document.getElementById('result');
            const resultTitle = document.getElementById('result-title');
            const resultContent = document.getElementById('result-content');
            const token = document.getElementById('token').value;
            
            // Show loading state
            btn.disabled = true;
            btnText.textContent = 'Running Migration...';
            spinner.style.display = 'block';
            btn.classList.add('loading');
            result.style.display = 'none';
            
            try {
                const response = await fetch('https://web-production-51f67.up.railway.app/emergency/database-migrate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `token=${encodeURIComponent(token)}`
                });
                
                const data = await response.json();
                
                // Show result
                result.style.display = 'block';
                
                if (data.success) {
                    result.className = 'result success';
                    resultTitle.textContent = '✅ Migration Successful!';
                    resultContent.textContent = JSON.stringify(data, null, 2);
                } else {
                    result.className = 'result error';
                    resultTitle.textContent = '❌ Migration Failed';
                    resultContent.textContent = JSON.stringify(data, null, 2);
                }
                
            } catch (error) {
                result.style.display = 'block';
                result.className = 'result error';
                resultTitle.textContent = '❌ Network Error';
                resultContent.textContent = `Error: ${error.message}\n\nMake sure the Railway application is running and the endpoint is accessible.`;
            } finally {
                // Reset button state
                btn.disabled = false;
                btnText.textContent = 'Run Emergency Migration';
                spinner.style.display = 'none';
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
